{% if GITHUB_USER %}
<ul class="repos" aria-label="GitHub repositories">
    {%- for repository in github_projects|selectattr("name", "repo_check") -%}
    <li>
        <h2>{{ repository.name -}}</h2>
        <p>{{ repository.description }}</p>
        <a class="repo-link" href="{{ repository.github_url }}" rel="noopener noreferrer">View repo <span aria-hidden="true">→</span></a>
    </li>
    {%- endfor -%}
</ul>
{% endif %}
